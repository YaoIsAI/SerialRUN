<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1440px;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(160deg, #0a0e27 0%, #0f172a 40%, #111827 100%);
  color: white;
  overflow: hidden;
  position: relative;
}

.bg-glow {
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
  top: -100px; right: -100px;
  border-radius: 50%;
}

.content {
  position: relative;
  z-index: 10;
  padding: 80px 60px 60px;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.header {
  margin-bottom: 40px;
  text-align: center;
}
.header .label {
  font-size: 16px;
  color: #3b82f6;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.header h1 {
  font-size: 48px;
  font-weight: 700;
  line-height: 1.2;
}
.header h1 span {
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header p {
  font-size: 22px;
  color: #94a3b8;
  margin-top: 12px;
}

/* Screenshot frame */
.screenshot-frame {
  flex: 1;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Window title bar */
.titlebar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.titlebar .dot {
  width: 12px; height: 12px;
  border-radius: 50%;
}
.titlebar .dot.red { background: #ef4444; }
.titlebar .dot.yellow { background: #eab308; }
.titlebar .dot.green { background: #22c55e; }
.titlebar .title {
  flex: 1;
  text-align: center;
  font-size: 14px;
  color: #64748b;
}

.screenshot-img {
  flex: 1;
  width: 100%;
  object-fit: contain;
  object-position: top center;
  background: #0d1117;
}

/* Features list at bottom */
.features-bar {
  margin-top: 30px;
  display: flex;
  gap: 16px;
}
.feature-chip {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.feature-chip .icon { font-size: 28px; margin-bottom: 6px; }
.feature-chip .name { font-size: 16px; font-weight: 600; color: #e2e8f0; }
.feature-chip .desc { font-size: 13px; color: #64748b; margin-top: 2px; }

.footer-bar {
  margin-top: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.footer-bar .brand { font-size: 24px; font-weight: 700; color: #475569; }
.footer-bar .brand span { color: #3b82f6; }
.footer-bar .url { font-size: 16px; color: #475569; text-align: right; line-height: 1.5; }
</style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="content">
    <div class="header">
      <div class="label">REAL INTERFACE</div>
      <h1>所见即所得<br><span>专业级界面</span></h1>
      <p>多窗口独立运行 &middot; 实时数据监控 &middot; 协议分析一目了然</p>
    </div>

    <div class="screenshot-frame">
      <div class="titlebar">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <div class="title">SerialRUN — Modbus RTU</div>
      </div>
      <img class="screenshot-img" src="../../screenshot_en.png" alt="SerialRUN Screenshot">
    </div>

    <div class="features-bar">
      <div class="feature-chip">
        <div class="icon">&#x1F4AC;</div>
        <div class="name">终端</div>
        <div class="desc">HEX/TEXT 双模</div>
      </div>
      <div class="feature-chip">
        <div class="icon">&#x1F4CA;</div>
        <div class="name">寄存器</div>
        <div class="desc">实时监控</div>
      </div>
      <div class="feature-chip">
        <div class="icon">&#x2699;&#xFE0F;</div>
        <div class="name">协议</div>
        <div class="desc">Modbus/PLC</div>
      </div>
      <div class="feature-chip">
        <div class="icon">&#x1F310;</div>
        <div class="name">桥接</div>
        <div class="desc">TCP/RTU</div>
      </div>
    </div>

    <div class="footer-bar">
      <div class="brand">Serial<span>RUN</span></div>
      <div class="url">www.serialrun.com<br>github.com/YaoIsAI/SerialRUN</div>
    </div>
  </div>
</body>
</html>
