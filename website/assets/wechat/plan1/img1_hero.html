<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1440px;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(160deg, #0a0e27 0%, #0f172a 30%, #1a1040 60%, #0f172a 100%);
  color: white;
  overflow: hidden;
  position: relative;
}

/* Animated grid background */
.grid-bg {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Glow orbs */
.orb1 {
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
  top: -100px; right: -150px;
  border-radius: 50%;
}
.orb2 {
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
  bottom: 100px; left: -100px;
  border-radius: 50%;
}

.content {
  position: relative;
  z-index: 10;
  padding: 120px 80px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Top badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 100px;
  padding: 10px 24px;
  font-size: 18px;
  color: #60a5fa;
  width: fit-content;
  letter-spacing: 1px;
}

/* Main title */
.title-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
}

.logo-text {
  font-size: 120px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -2px;
}
.logo-text .serial { color: #ffffff; }
.logo-text .run {
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 42px;
  font-weight: 300;
  color: #94a3b8;
  line-height: 1.4;
  max-width: 700px;
}

.tagline {
  font-size: 28px;
  color: #64748b;
  line-height: 1.6;
  border-left: 3px solid #3b82f6;
  padding-left: 24px;
}

/* Feature pills */
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 20px;
}
.pill {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 20px;
  color: #cbd5e1;
}

/* Bottom section */
.bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.version {
  font-size: 22px;
  color: #475569;
}
.version strong {
  color: #3b82f6;
}
.cta {
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  border-radius: 16px;
  padding: 20px 48px;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 1px;
  text-align: center;
  line-height: 1.5;
}
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>

  <div class="content">
    <div class="badge">BSL 1.1 &middot; Source Available</div>

    <div class="title-area">
      <div class="logo-text">
        <span class="serial">Serial</span><span class="run">RUN</span>
      </div>
      <div class="subtitle">
        专业串口调试助手<br>
        <span style="font-size:32px;color:#64748b;">Professional Serial Port Debugging Assistant</span>
      </div>
      <div class="tagline">
        一站式串口调试工具<br>
        Modbus &middot; PLC &middot; CAN &middot; I2C/SPI &middot; MCP AI
      </div>
      <div class="pills">
        <div class="pill">Windows</div>
        <div class="pill">macOS</div>
        <div class="pill">Linux</div>
        <div class="pill">Rust</div>
        <div class="pill">AI Ready</div>
      </div>
    </div>

    <div class="bottom">
      <div class="version"><strong>v0.2.0</strong> &middot; 2026</div>
      <div class="cta">www.serialrun.com<br><span style="font-size:16px;opacity:0.8;">github.com/YaoIsAI/SerialRUN</span></div>
    </div>
  </div>
</body>
</html>
