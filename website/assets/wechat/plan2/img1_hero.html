<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1440px;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(160deg, #a8d5a8 0%, #b8ddb8 30%, #a8d5a8 60%, #b8ddb8 100%);
  color: white;
  overflow: hidden;
  position: relative;
}

/* Animated grid background */
.grid-bg {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(34,197,94,0.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,0.4) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Glow orbs */
.orb1 {
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(34,197,94,0.4) 0%, transparent 70%);
  top: -100px; right: -150px;
  border-radius: 50%;
}
.orb2 {
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(6,182,212,0.3) 0%, transparent 70%);
  bottom: 100px; left: -100px;
  border-radius: 50%;
}

.content {
  position: relative;
  z-index: 10;
  padding: 120px 80px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Top badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(34,197,94,0.4);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 100px;
  padding: 10px 24px;
  font-size: 18px;
  color: #0a1f12;
  width: fit-content;
  letter-spacing: 1px;
}

/* Main title */
.title-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
}

.logo-text {
  font-size: 120px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -2px;
}
.logo-text .serial { color: #0a1f12; }
.logo-text .run {
  background: linear-gradient(135deg, #0a5c2a, #065f7a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 42px;
  font-weight: 300;
  color: #0a1f12;
  line-height: 1.4;
  max-width: 700px;
}

.tagline {
  font-size: 28px;
  color: #1a3a24;
  line-height: 1.6;
  border-left: 3px solid #22c55e;
  padding-left: 24px;
}

/* Feature pills */
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 20px;
}
.pill {
  background: rgba(255,255,255,0.82);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 20px;
  color: #0a1f12;
}

/* Website banner */
.website-banner {
  background: linear-gradient(135deg, rgba(34,197,94,0.35), rgba(6,182,212,0.3));
  border: 1px solid rgba(34,197,94,0.4);
  border-radius: 16px;
  padding: 24px 40px;
  text-align: center;
  margin-top: 30px;
}
.website-banner .url {
  font-size: 36px;
  font-weight: 700;
  background: linear-gradient(135deg, #0a5c2a, #065f7a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 1px;
}
.website-banner .hint {
  font-size: 16px;
  color: #1a3a24;
  margin-top: 6px;
}

/* Bottom section */
.bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: 24px;
}
.version {
  font-size: 22px;
  color: #0a1f12;
}
.version strong {
  color: #0a1f12;
}
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>

  <div class="content">
    <div class="badge">BSL 1.1 &middot; Source Available</div>

    <div class="title-area">
      <div class="logo-text">
        <span class="serial">Serial</span><span class="run">RUN</span>
      </div>
      <div class="subtitle">
        专业串口调试助手<br>
        <span style="font-size:32px;color:#64748b;">Professional Serial Port Debugging Assistant</span>
      </div>
      <div class="tagline">
        一站式串口调试工具<br>
        Modbus &middot; PLC &middot; CAN &middot; I2C/SPI &middot; MCP AI
      </div>
      <div class="pills">
        <div class="pill">Windows</div>
        <div class="pill">macOS</div>
        <div class="pill">Linux</div>
        <div class="pill">Rust</div>
        <div class="pill">AI Ready</div>
      </div>
    </div>

    <div class="website-banner">
      <div class="url">www.serialrun.com</div>
      <div class="hint">下载 &middot; 文档 &middot; 插件 &middot; 社区</div>
    </div>

    <div class="bottom">
      <div class="version"><strong>v0.2.0</strong> &middot; BSL 1.1</div>
      <div class="version">github.com/YaoIsAI/SerialRUN</div>
    </div>
  </div>
</body>
</html>
