<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Hero</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1440px;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(160deg, #0a0e27, #0c1445, #1a0a3e, #0f172a);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Background decorations */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .bg-circle.c1 {
    width: 600px; height: 600px;
    top: -200px; right: -150px;
    background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
  }
  .bg-circle.c2 {
    width: 500px; height: 500px;
    bottom: -100px; left: -100px;
    background: radial-gradient(circle, rgba(167,139,250,0.1) 0%, transparent 70%);
  }
  .bg-circle.c3 {
    width: 300px; height: 300px;
    top: 40%; left: 60%;
    background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
  }

  /* Circuit lines */
  .circuit {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    opacity: 0.06;
  }
  .circuit-line {
    position: absolute;
    background: #3b82f6;
  }
  .circuit-line.h1 { top: 200px; left: 80px; width: 300px; height: 1px; }
  .circuit-line.h2 { top: 450px; right: 60px; width: 200px; height: 1px; }
  .circuit-line.h3 { top: 1000px; left: 200px; width: 400px; height: 1px; }
  .circuit-line.v1 { top: 150px; left: 380px; width: 1px; height: 200px; }
  .circuit-line.v2 { top: 350px; right: 260px; width: 1px; height: 300px; }
  .circuit-dot {
    position: absolute;
    width: 6px; height: 6px;
    background: #3b82f6;
    border-radius: 50%;
  }
  .circuit-dot.d1 { top: 197px; left: 377px; }
  .circuit-dot.d2 { top: 447px; right: 257px; }
  .circuit-dot.d3 { top: 997px; left: 197px; }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 80px;
  }

  .badge {
    display: inline-block;
    background: rgba(59,130,246,0.12);
    border: 1px solid rgba(59,130,246,0.3);
    color: #60a5fa;
    padding: 10px 28px;
    border-radius: 100px;
    font-size: 18px;
    letter-spacing: 3px;
    margin-bottom: 48px;
  }

  h1 {
    font-size: 88px;
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 28px;
    background: linear-gradient(135deg, #ffffff 0%, #93c5fd 40%, #c4b5fd 70%, #67e8f9 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 30px;
    color: #94a3b8;
    margin-bottom: 70px;
    line-height: 1.6;
  }

  /* Timeline */
  .timeline {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-top: 20px;
  }
  .t-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 150px;
  }
  .t-dot {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 14px;
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
  }
  .t-item:nth-child(1) .t-dot { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
  .t-item:nth-child(3) .t-dot { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
  .t-item:nth-child(5) .t-dot { background: linear-gradient(135deg, #4ade80, #16a34a); }
  .t-item:nth-child(7) .t-dot { background: linear-gradient(135deg, #06b6d4, #0891b2); }
  .t-ver {
    font-size: 20px;
    font-weight: 700;
    color: #e2e8f0;
  }
  .t-date {
    font-size: 15px;
    color: #64748b;
    margin-top: 6px;
  }
  .t-arrow {
    font-size: 32px;
    color: #334155;
    margin-bottom: 30px;
  }

  .bottom-text {
    margin-top: 80px;
    font-size: 22px;
    color: #475569;
    letter-spacing: 2px;
  }
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #3b82f6, #a78bfa, #4ade80, #06b6d4);
  }
</style>
</head>
<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>
<div class="bg-circle c3"></div>

<div class="circuit">
  <div class="circuit-line h1"></div>
  <div class="circuit-line h2"></div>
  <div class="circuit-line h3"></div>
  <div class="circuit-line v1"></div>
  <div class="circuit-line v2"></div>
  <div class="circuit-dot d1"></div>
  <div class="circuit-dot d2"></div>
  <div class="circuit-dot d3"></div>
</div>

<div class="content">
  <div class="badge">SerialRUN</div>
  <h1>6天，4个版本</h1>
  <p class="subtitle">从串口调试助手到 AI 驱动开发平台</p>

  <div class="timeline">
    <div class="t-item">
      <div class="t-dot">v0.1</div>
      <div class="t-ver">v0.1.0</div>
      <div class="t-date">5月31日</div>
    </div>
    <div class="t-arrow">→</div>
    <div class="t-item">
      <div class="t-dot">v0.2</div>
      <div class="t-ver">v0.2.0</div>
      <div class="t-date">6月2日</div>
    </div>
    <div class="t-arrow">→</div>
    <div class="t-item">
      <div class="t-dot">v0.3</div>
      <div class="t-ver">v0.3.0</div>
      <div class="t-date">6月4日</div>
    </div>
    <div class="t-arrow">→</div>
    <div class="t-item">
      <div class="t-dot">v0.4</div>
      <div class="t-ver">v0.4.0</div>
      <div class="t-date">6月5日</div>
    </div>
  </div>

  <p class="bottom-text">serialrun.com &middot; MIT License &middot; Open Source</p>
</div>

<div class="bottom-bar"></div>
</body>
</html>
