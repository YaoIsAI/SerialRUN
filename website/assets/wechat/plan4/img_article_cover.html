<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1440px;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(160deg, #0a0e27 0%, #0c1445 40%, #1a0a3e 70%, #0f172a 100%);
  color: white; overflow: hidden; position: relative;
}
.glow1 { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%); top: 100px; left: -200px; border-radius: 50%; }
.glow2 { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%); bottom: 200px; right: -150px; border-radius: 50%; }
.content { position: relative; z-index: 10; padding: 100px 80px 60px; height: 100%; display: flex; flex-direction: column; justify-content: center; }
.label { font-size: 16px; color: #64748b; letter-spacing: 3px; margin-bottom: 30px; text-transform: uppercase; }
h1 { font-size: 72px; font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
h1 span { background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { font-size: 28px; color: #94a3b8; margin-bottom: 50px; line-height: 1.6; }
.timeline { display: flex; gap: 24px; margin-bottom: 40px; flex-wrap: wrap; }
.tl-item { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 20px; }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.tl-text { font-size: 16px; font-weight: 600; color: #e2e8f0; }
.tl-date { font-size: 13px; color: #64748b; margin-left: 8px; }
.stats { display: flex; gap: 40px; margin-top: 30px; }
.stat { text-align: center; }
.stat-num { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-label { font-size: 16px; color: #94a3b8; margin-top: 4px; }
.footer { position: absolute; bottom: 40px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); }
.footer .brand { font-size: 32px; font-weight: 700; color: #475569; }
.footer .brand span { color: #3b82f6; }
.footer .url { font-size: 18px; color: #475569; text-align: right; line-height: 1.5; }
</style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="label">SERIALRUN · BEHIND THE CODE</div>
    <h1>6 天<br><span>造了一个世界</span></h1>
    <div class="subtitle">SerialRUN 从 v0.1.0 到 v0.4.0 背后的故事</div>

    <div class="timeline">
      <div class="tl-item"><div class="tl-dot" style="background:#3b82f6"></div><div class="tl-text">v0.1.0</div><div class="tl-date">5.31</div></div>
      <div class="tl-item"><div class="tl-dot" style="background:#8b5cf6"></div><div class="tl-text">v0.2.0</div><div class="tl-date">6.02</div></div>
      <div class="tl-item"><div class="tl-dot" style="background:#059669"></div><div class="tl-text">v0.3.0</div><div class="tl-date">6.04</div></div>
      <div class="tl-item"><div class="tl-dot" style="background:#d97706"></div><div class="tl-text">v0.4.0</div><div class="tl-date">6.05</div></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-num">6</div><div class="stat-label">天</div></div>
      <div class="stat"><div class="stat-num">4</div><div class="stat-label">版本</div></div>
      <div class="stat"><div class="stat-num">19</div><div class="stat-label">MCP 工具</div></div>
      <div class="stat"><div class="stat-num">8K+</div><div class="stat-label">行代码</div></div>
    </div>
  </div>
  <div class="footer">
    <div class="brand">Serial<span>RUN</span></div>
    <div class="url">www.serialrun.com<br>github.com/YaoIsAI/SerialRUN</div>
  </div>
</body>
</html>
